{% extends "shop/base.html" %}

{% block title %}{{ product.name }}{% endblock %}

{% block content %}
<style>
button {
    background-color: #34113F;
    border: none;
    padding: 10px 20px;
    cursor: pointer;
    color: white;

}

button:hover {
    background-color: #C97D60;
    color: white;
}

.container {
  display: grid;
  grid-template-columns: 300px auto;
  background-color:#D4D6CA ;
  padding: 10px;
}

.container div {
  background-color: #f1f1f1;

  padding: 10px;
  font-size: 15px;
  text-align:left;
}

</style>
<div class="container">
    <div>
       
    </div>
    <div>
        <h1>{{ product.name }}</h1>
    </div>
</div>



<div class="container">
    <div>
        <img src="{{ product.image.url }}" width="200">
        <p>{{ product.description }}</p>
        <p>Price: ${{ product.price }}</p>
    </div>
    <div>

<form action="{% url 'add_to_cart' product.slug %}" method="post">
    {% csrf_token %}
    <label>Quantity:</label>
    <input type="number" name="quantity" value="1" min="1">
    <button type="submit">Add to Cart</button>
</form>
    </div>
    
  </div>


{% endblock %}
