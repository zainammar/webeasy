
 <meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
body {margin:0;font-family:Arial}

.topnav {
  overflow: hidden;
  background-color: #333;
}

.topnav a {
  float: left;
  display: block;
  color: #f2f2f2;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
  font-size: 17px;
}

.active {
  background-color: #04AA6D;
  color: white;
}

.topnav .icon {
  display: none;
}

.dropdown {
  float: left;
  overflow: hidden;
}

.dropdown .dropbtn {
  font-size: 17px;    
  border: none;
  outline: none;
  color: white;
  padding: 14px 16px;
  background-color: inherit;
  font-family: inherit;
  margin: 0;
}

.dropdown-content {
  display: none;
  position: absolute;
  background-color: #f9f9f9;
  min-width: 160px;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
  z-index: 1;
}

.dropdown-content a {
  float: none;
  color: black;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
  text-align: left;
}

.topnav a:hover, .dropdown:hover .dropbtn {
  background-color: #555;
  color: white;
}

.dropdown-content a:hover {
  background-color: #ddd;
  color: black;
}

.dropdown:hover .dropdown-content {
  display: block;
}

@media screen and (max-width: 600px) {
  .topnav a:not(:first-child), .dropdown .dropbtn {
    display: none;
  }
  .topnav a.icon {
    float: right;
    display: block;
  }
}

@media screen and (max-width: 600px) {
  .topnav.responsive {position: relative;}
  .topnav.responsive .icon {
    position: absolute;
    right: 0;
    top: 0;
  }
  .topnav.responsive a {
    float: none;
    display: block;
    text-align: left;
  }
  .topnav.responsive .dropdown {float: none;}
  .topnav.responsive .dropdown-content {position: relative;}
  .topnav.responsive .dropdown .dropbtn {
    display: block;
    width: 100%;
    text-align: left;
  }
}

.btn-a{
  background-color:green;
  text-decoration:none;
  color: white !important;
  padding:10px;
  margin:10px;
  float:left;
  display: block;
  overflow: hidden;
}

.btn-a:hover
{
  background-color:black;
  text-decoration: none !important;
  color: white !important;
  padding:10px;
  margin:10px;
  float:left;
  display: block;
  overflow: hidden;


}
.category a {
  color: rgb(255, 255, 255);
  text-decoration: none !important;
}
.category-link {
  text-decoration: none !important;
}

</style>

  <div class="topnav">
  
 <a href="{% url 'home' %}">Home</a> 
      <a href="{% url 'page_detail' 'about-us' %}">About Us</a>
          <a href="/shop/">Shop</a> 
         <a href="{% url 'logout' %}">Logout</a>
           <a href="{% url 'checkout' %}"> </a> 
</div>
<br>
<div class="category-nav">
  <strong>Categories:</strong>
  <ul>
    <li class="btn-a category">
  <a href="{% url 'product_list' %}">All</a> {# Link to show all products #}
  {% for cat in categories %}     </li>
  <li class="btn-a  category">
    <a href="{% url 'product_list_by_category' cat.slug %}">{{ cat.name }}</a>     
  </li>
  {% endfor %}
</ul>
</div>
 
       
 <br>
<h1>Products </h1>
<ul>
    {% for product in products %}
    <li class="btn-a  category">
            <a href="{% url 'product_detail' product.slug %}">{{ product.name }}</a>
            - ${{ product.price }}
        </li>
    {% endfor %}
</ul>
